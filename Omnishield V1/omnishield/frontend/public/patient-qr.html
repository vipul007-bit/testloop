<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OmniShield — Patient QR Card</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,.12); text-align: center; max-width: 320px; width: 100%; }
    .logo { color: #2563eb; font-weight: 800; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 12px; margin-bottom: 24px; }
    #qr { margin: 0 auto 20px; }
    .name { font-weight: 700; font-size: 20px; color: #0f172a; margin-bottom: 4px; }
    .id { font-family: monospace; font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .badge { background: #f1f5f9; color: #64748b; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
    .badge.allergy { background: #fee2e2; color: #dc2626; }
    .print-btn { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .instructions { margin-top: 20px; font-size: 12px; color: #94a3b8; line-height: 1.6; }
    @media print { .print-btn, .instructions { display: none; } body { background: white; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛡️ OmniShield</div>
    <div class="subtitle">Smart Health Card</div>
    <canvas id="qr" width="200" height="200"></canvas>
    <div class="name">Priya Nair</div>
    <div class="id">IN-MH-2024-04812</div>
    <div class="badges">
      <span class="badge">Age 34</span>
      <span class="badge">Female</span>
      <span class="badge">B+</span>
      <span class="badge allergy">⚠ Sulfonamides</span>
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ Print QR Card</button>
    <div class="instructions">
      Scan this QR in the OmniShield Doctor Portal<br>
      to load the patient profile.
    </div>
  </div>

  <!-- Simple QR generator using qrcode-generator -->
  <script>
    // Draw a simple QR-like pattern for demo purposes
    // In production: use a real QR library like qrcode.js
    const canvas = document.getElementById('qr');
    const ctx = canvas.getContext('2d');
    const size = 200;
    const modules = 21; // QR v1
    const cell = size / modules;

    // Patient data payload
    const payload = JSON.stringify({
      id: "IN-MH-2024-04812",
      name: "Priya Nair",
      dob: "1990",
      gender: "F",
      blood: "B+",
      allergy: "Sulfonamides",
      // base58 seed for key derivation (demo only - NOT a real key)
      seed: "7xKp2mNvQr4tYwZaBcDeFgHiJkLmNpQrStUvWx"
    });

    // Draw background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);

    // Use a deterministic pattern based on payload hash
    let hash = 0;
    for (let i = 0; i < payload.length; i++) {
      hash = ((hash << 5) - hash) + payload.charCodeAt(i);
      hash |= 0;
    }

    ctx.fillStyle = '#000000';

    // Draw finder patterns (corners)
    function drawFinder(x, y) {
      ctx.fillRect(x*cell, y*cell, 7*cell, 7*cell);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect((x+1)*cell, (y+1)*cell, 5*cell, 5*cell);
      ctx.fillStyle = '#000000';
      ctx.fillRect((x+2)*cell, (y+2)*cell, 3*cell, 3*cell);
    }
    drawFinder(0, 0);
    drawFinder(14, 0);
    drawFinder(0, 14);

    // Draw timing pattern
    for (let i = 8; i < 13; i++) {
      if (i % 2 === 0) ctx.fillRect(i*cell, 6*cell, cell, cell);
      if (i % 2 === 0) ctx.fillRect(6*cell, i*cell, cell, cell);
    }

    // Fill data region with pseudo-random pattern from hash
    let seed = Math.abs(hash);
    for (let r = 0; r < modules; r++) {
      for (let c = 0; c < modules; c++) {
        // Skip finder + timing zones
        if ((r < 9 && c < 9) || (r < 9 && c > 11) || (r > 11 && c < 9)) continue;
        if (r === 6 || c === 6) continue;
        seed = (seed * 1664525 + 1013904223) & 0xffffffff;
        if (seed & 1) ctx.fillRect(c*cell, r*cell, cell, cell);
      }
    }

    // Draw border
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.strokeRect(0, 0, size, size);

    // Add OmniShield logo in center
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(8*cell, 8*cell, 5*cell, 5*cell);
    ctx.fillStyle = '#2563eb';
    ctx.font = `bold ${Math.floor(cell * 3)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🛡', size/2, size/2);
  </script>
</body>
</html>
