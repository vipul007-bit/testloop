version: '3.9'

# ⚠️  LOCAL DEVELOPMENT ONLY — Credentials here are for local dev convenience.
# For any shared or production-like environment, move sensitive values to a
# .env file (never committed to git) and reference them with ${VARIABLE_NAME}.
# Example: POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: omnishield_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnishield
      POSTGRES_PASSWORD: omnishield_dev_password  # Change for shared environments
      POSTGRES_DB: omnishield_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnishield -d omnishield_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnishield_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://omnishield:omnishield_dev_password@db:5432/omnishield_db
      JWT_SECRET: omnishield-production-secret-replace-this
      CORS_ORIGINS: http://localhost:5173,http://frontend:80
      COORDINATE_FUZZ_DEGREES: "0.001"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend PWA ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: omnishield_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
    driver: local
